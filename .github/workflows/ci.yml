name: CI

# Gate obrigatório antes de merge: typecheck + lint (escopo mantido) + testes unitários.
# Torna verificável a qualidade do código NOVO sem depender do build ignorar lint.
# (Lint repo-wide tem débito pré-existente em outros módulos — cleanup é tarefa à parte.)
on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm run lint:whatsapp
      - run: npm test
